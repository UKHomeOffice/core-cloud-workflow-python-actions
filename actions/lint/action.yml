name: 'Lint python'
description: 'Runs linting for the Python project'

inputs:
  working-directory:
    description: 'The working directory where the linting should be run'
    required: false
    default: '.'

outputs:
  python_lint_exit_code:
    description: "The exit code from the python lint command"
    value: ${{ steps.python_lint.outputs.exit_code }}
  
runs:
  using: "composite"
  steps:
    - name: Install ruff
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        pip install ruff
    
    - name: Run Python lint
      id: python_lint
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set +e
        ruff check --diff --output-format=github .
        EXIT_CODE=$?
        set -e

        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT